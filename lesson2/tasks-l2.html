<!DOCTYPE html>
<html>
    <head>
        <title>Lesson 2 tasks</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

        <script type="text/babel">
            
            //2h cross out text for the original price if discounted 
            function App(){
                return(
                    <>
                        <ProductDetails name="Cotton socks" price="10.90" discprice="5.45"/>
                        <ProductDetails name="Tennis balls" price="6.00" discprice="3.00"/>
                        <ProductDetails name="Cotton socks" price="7.99"/>
                    </>
                )
            }

            function ProductDetails({ name, price, discprice }){
                return (
                    <div>
                        <p>{ name }</p>
                        { discprice 
                            ? <del> <p>Price: ${ price }</p> </del> 
                            : <p>Price: ${ price }</p> }
                        { discprice && <p>Discount price: ${ discprice }</p>}
                        <button>Add to cart</button>
                    </div>
                )
            }

            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App />)
            
        </script>
    </body>
</html>
