<!DOCTYPE html>
<html>
    <head>
        <title>Lesson  tasks</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>

        <script type="text/babel">
            function App(){
                const [counter, setCounter] = React.useState(0);
                const [isAutoClickOn, setIsAutoClickOn] = React.useState(false);
                const autoClickRef = React.useRef(null);
                const buttonElem = React.useRef(null);

                function reset(){
                    setCounter(0)
                }

                function handleClick(){
                    if(isAutoClickOn){
                        clearInterval(autoClickRef.current)
                        setIsAutoClickOn(false)
                    } else {
                        autoClickRef.current = setInterval(()=>{
                            // setCounter(prev=>prev+1)
                            buttonElem.current.click();
                        },1000);
                        setIsAutoClickOn(true)
                    }
                }

                return(
                    <>  
                        <button ref={buttonElem} onClick={()=>{setCounter(prev=>prev+1)}}>
                            Clicked {counter} times
                        </button>
                        <button onClick={()=>{setCounter(0)}}>Reset</button>
                        <button onClick={handleClick}>Auto Click</button>
                    </>
                )
            }

            const container = document.querySelector('.js-container');
            ReactDOM.createRoot(container).render(<App />)
            
        </script>
    </body>
</html>
