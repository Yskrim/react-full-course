<!DOCTYPE html>
<html>
    <head>
        <title>Chatbot</title>
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                margin: 0px 8px;
            }
            .intro-text{
                opacity: 0.5;
                text-align: center;
            }
            .loading-spinner{
                height: 40px;
                margin: -15px;
            }

            .app-container{
                height: 100vh;
                display: flex;
                flex-direction: column;
                max-width: 700px;
                margin-left: auto;
                margin-right: auto;

            }

            .send-button{
                background-color: rgb(25, 135, 84);
                color: white;
                border: none;
                padding: 10px 20px;
                margin-left: 8px;
                border-radius: 10px;
                font-size: 15px;
                cursor: pointer;
            }

            .chat-input{
                padding: 12px 15px;
                border-width: 1px;
                border-radius: 10px;
                font-size: 15px;
                flex-grow: 1;
            }

            .chat-input-container{
                display: grid;
                grid-template-columns: 1fr auto;
                margin-bottom: 60px;
            }

            .chat-message-user{
                display: flex;
                justify-content: end;
                align-items: center;
                padding: 12px;
            }

            .chat-message-robot{
                display: flex;
                align-items: center;
            }

            .chat-message-text{
                font-size: 15px;
                background-color: rgb(238, 238, 238);
                border-radius: 10px;
                padding: 15px 20px;
                margin: 10px 10px;
                max-width: 300px;
            }

            .profile-img{
                width: 48px;
            }

            .chat-messages-container{
                flex-grow: 1;
                margin-top:20px;
                overflow: scroll;
                scrollbar-width: none;
            }
        </style>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
        <script type="text/babel">        
            function ChatMessages({ chatMessages }){
                const chatMessagesRef = React.useRef(null);

                React.useEffect(()=>{
                    const containerElem =chatMessagesRef.current;
                    if(containerElem){
                        containerElem.scrollTop = containerElem.scrollHeight;
                    }
                }, [chatMessages]);

                return(
                    <div className="chat-messages-container" ref={chatMessagesRef}>
                        {chatMessages.map((obj, ind)=>{
                            return(
                                <ChatMessage 
                                    key={obj.id} 
                                    message={obj.message} 
                                    sender={obj.sender}
                                />
                            )
                        })}
                    </div>
                ) 
            }

            function ChatInput({ chatMessages, setChatMessages }){
                const [inputText, setInputText] = React.useState('');
                const [isLoading, setIsLoading] = React.useState(false);
                const inputRef = React.useRef(null);

                function saveInputText(event){
                    setInputText(event.target.value)
                }

                async function sendMessage(){
                    const newChatMessages = [
                        ...chatMessages, 
                        {
                            message: inputText,
                            sender: 'user',
                            id: crypto.randomUUID()
                        },
                        {
                            message: <img src="./assets/loading-spinner.gif" className="loading-spinner"/>,
                            sender: 'robot',
                            id: crypto.randomUUID()
                        }
                    ]
                    setChatMessages(newChatMessages)
                    setIsLoading(true)

                    const response = await Chatbot.getResponseAsync(inputText);
                    setIsLoading(false);
                    newChatMessages.splice(-1,1);
                    setChatMessages([
                        ...newChatMessages, 
                        {
                            message: response,
                            sender: 'robot',
                            id: crypto.randomUUID()
                        }
                    ])
                    
                    setInputText('')
                }
                
                React.useEffect(()=>{
                    if(!isLoading && inputRef.current){
                        inputRef.current.focus()
                    }
                },[isLoading])

                return (
                    <div className="chat-input-container">
                        <input 
                            ref={inputRef}
                            className="chat-input"
                            placeholder="Send a message to Chatbot" 
                            disabled={isLoading}
                            onChange={(e)=>{
                                setInputText(e.target.value)
                            }}
                            onKeyDown={(e)=>{
                                e.key==='Enter'&&sendMessage()
                                e.key==='Escape'&&setInputText('')
                            }}
                            value={inputText}
                        />   
                        <button
                            onClick={sendMessage}
                            className="send-button"
                        >Send</button>
                    </div>
            )}

            function ChatMessage({ message, sender }){
                return (
                    <div 
                        className={sender === 'user' 
                            ? 'chat-message-user' 
                            : 'chat-message-robot'}
                    >

                        {sender === "robot" && <img src="./assets/robot.png" className="profile-img"/>}
                        <div className="chat-message-text">{message}</div>
                        {sender === "user" && <img src="./assets/user.png" className="profile-img"/>}
                    </div>
                )
            }

            function App(){

                const [chatMessages, setChatMessages] = React.useState([])

                return (
                    <div className="app-container">
                        {chatMessages.length===0
                            ? <p className="intro-text">Welcome to the chatbot project! Send a message using the textbox below.</p>
                            : <ChatMessages chatMessages={chatMessages}/>}
                        <ChatInput 
                            chatMessages={chatMessages}
                            setChatMessages={setChatMessages}
                        />
                    </div>
                )
            }

            const container = document.querySelector('.js-container');
            ReactDOM
                .createRoot(container)
                .render(
                    <App />
                );
        </script>
    </body>
</html>
