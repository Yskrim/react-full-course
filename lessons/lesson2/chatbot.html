<!DOCTYPE html>
<html>
    <head>
        <title>Chatbot</title>
    </head>
    <body>
        <div class="js-container"></div>

        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            function ChatInput(){   // component name should start with a Capital letter (Pascal Case)
                return (
                    <>
                        <input placeholder="Send a message to Chatbot" size="30"/>   
                        <button>Send</button>
                    </>
            )}

            function ChatMessage({ message, sender }){
                return (
                    <div>
                        {sender === "robot" && <img src="./assets/robot.png" width="32"/>}
                        {message}
                        {sender === "user" && <img src="./assets/user.png" width="32"/>}
                    </div>
                )
            }

            function App(){
                return (
                    <div>
                        <ChatInput />
                        <ChatMessage message="hello chatbot" sender="user"/>
                        <ChatMessage message="Hi! how can I help you?" sender="robot"/>
                        <ChatMessage message="Can you get me today's date?" sender="user"/>
                        <ChatMessage message="Today is April 8" sender="robot"/>
                    </div>
                )
            }

            const container = document.querySelector('.js-container');
            ReactDOM
                .createRoot(container)
                .render(
                    <App />
                );
        </script>
    </body>
</html>
